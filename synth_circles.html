<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>SYNTH CIRCLES</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;
      font-family: 'Courier New', Courier, monospace;
    }
    canvas {
      display: block;
      touch-action: none;
    }
    #hud {
      position: fixed;
      top: 0; left: 0; right: 0;
      display: flex;
      justify-content: center;
      padding: 14px 0 0;
      pointer-events: none;
      z-index: 10;
    }
    #title {
      color: #ff2dff;
      font-size: 20px;
      letter-spacing: 6px;
      text-shadow:
        0 0 8px #ff2dff,
        0 0 20px #ff2dff,
        0 0 40px #c000c0;
      animation: flicker 6s infinite;
    }
    @keyframes flicker {
      0%,95%,100% { opacity: 1; }
      96% { opacity: 0.7; }
      97% { opacity: 1; }
      98% { opacity: 0.5; }
      99% { opacity: 1; }
    }
    #hint {
      position: fixed;
      bottom: 18px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(0,255,255,0.45);
      font-size: 11px;
      letter-spacing: 3px;
      text-shadow: 0 0 8px rgba(0,255,255,0.3);
      pointer-events: none;
      white-space: nowrap;
    }
    #tap-to-start {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%,-50%);
      color: rgba(0,255,255,0.8);
      font-size: 14px;
      letter-spacing: 4px;
      text-shadow: 0 0 12px #00ffff;
      pointer-events: none;
      animation: pulse 1.5s ease-in-out infinite;
    }
    @keyframes pulse {
      0%,100% { opacity: 0.5; }
      50% { opacity: 1; }
    }
  </style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hud"><span id="title">◈ SYNTH CIRCLES ◈</span></div>
<div id="hint">DRAG TO CONNECT · RELEASE TO DRIFT</div>
<div id="tap-to-start">TAP ANYWHERE TO BEGIN</div>

<script>
'use strict';

const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
const tapMsg = document.getElementById('tap-to-start');

let W, H;
function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', () => { resize(); initCircles(); });

/* ─── AUDIO ─────────────────────────────────────────────────────────── */
let ac, masterGain, reverbSend, dryBus;
let audioReady = false;
let muted = false;

function buildReverb() {
  const len  = ac.sampleRate * 3;
  const buf  = ac.createBuffer(2, len, ac.sampleRate);
  for (let ch = 0; ch < 2; ch++) {
    const d = buf.getChannelData(ch);
    for (let i = 0; i < len; i++) {
      d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / len, 2.2);
    }
  }
  const conv = ac.createConvolver();
  conv.buffer = buf;
  return conv;
}

function initAudio() {
  if (audioReady) return;
  ac = new (window.AudioContext || window.webkitAudioContext)();

  // iOS Safari keeps AudioContext suspended until a sound is played inside
  // a user-gesture handler. Resume first, then play a silent 1-frame buffer
  // to "unlock" the context before building the graph.
  ac.resume();
  const unlock = ac.createBuffer(1, 1, ac.sampleRate);
  const unlockSrc = ac.createBufferSource();
  unlockSrc.buffer = unlock;
  unlockSrc.connect(ac.destination);
  unlockSrc.start(0);

  masterGain = ac.createGain();
  masterGain.gain.value = 0.75;
  masterGain.connect(ac.destination);

  // Build reverb after unlocking so heavy computation doesn't delay resume()
  const reverb = buildReverb();
  reverb.connect(masterGain);

  reverbSend = ac.createGain();
  reverbSend.gain.value = 0.55;
  reverbSend.connect(reverb);

  dryBus = ac.createGain();
  dryBus.gain.value = 0.45;
  dryBus.connect(masterGain);

  audioReady = true;
}

/* ─── NOTES ──────────────────────────────────────────────────────────── */
// C pentatonic — warm, never dissonant
const FREQS = [
  130.81, // C3
  164.81, // E3
  196.00, // G3
  261.63, // C4
  329.63, // E4
  392.00, // G4
  440.00, // A4
  523.25, // C5
];

/* ─── PALETTE ─────────────────────────────────────────────────────────── */
const PAL = [
  { hex: '#00f5ff', r: 0,   g: 245, b: 255 },
  { hex: '#ff2dff', r: 255, g: 45,  b: 255 },
  { hex: '#2dff88', r: 45,  g: 255, b: 136 },
  { hex: '#ff6200', r: 255, g: 98,  b: 0   },
  { hex: '#ff0077', r: 255, g: 0,   b: 119 },
  { hex: '#00aaff', r: 0,   g: 170, b: 255 },
  { hex: '#ffe600', r: 255, g: 230, b: 0   },
  { hex: '#aa00ff', r: 170, g: 0,   b: 255 },
];

function rgba(p, a) {
  return `rgba(${p.r},${p.g},${p.b},${a})`;
}

/* ─── CIRCLE CLASS ───────────────────────────────────────────────────── */
class Circle {
  constructor(idx) {
    this.id    = idx;
    this.col   = PAL[idx % PAL.length];
    this.freq  = FREQS[idx % FREQS.length];
    this.r     = 28 + Math.random() * 18;
    this.reset();

    // audio
    this.osc      = null;
    this.lfo      = null;
    this.filt     = null;
    this.gain     = null;
    this.playing  = false;
    this.targetVol= 0;

    // visuals
    this.phase     = Math.random() * Math.PI * 2;
    this.phaseSpd  = 0.025 + Math.random() * 0.015;
    this.connected = false;
    this.connAlpha = 0; // smooth in/out

    // spark particles
    this.sparks = [];
  }

  reset() {
    const margin = this.r + 10;
    this.x  = margin + Math.random() * (W - margin * 2);
    this.y  = margin + Math.random() * (H - margin * 2);
    this.vx = (Math.random() - 0.5) * 1.0;
    this.vy = (Math.random() - 0.5) * 1.0;
    this.dragging = false;
  }

  startOsc() {
    if (!audioReady || this.playing) return;

    // LPF for that mellow 80s pad feel
    this.filt = ac.createBiquadFilter();
    this.filt.type = 'lowpass';
    this.filt.frequency.value = 600 + this.freq * 0.8;
    this.filt.Q.value = 4;

    // Slow filter sweep
    this.filt.frequency.setValueAtTime(300, ac.currentTime);
    this.filt.frequency.linearRampToValueAtTime(
      1800 + this.freq, ac.currentTime + 3
    );

    this.gain = ac.createGain();
    this.gain.gain.value = 0;

    // Primary oscillator — sawtooth filtered = classic 80s pad
    this.osc = ac.createOscillator();
    this.osc.type = 'sawtooth';
    this.osc.frequency.value = this.freq;

    // Sub oscillator for warmth
    const sub = ac.createOscillator();
    sub.type = 'sine';
    sub.frequency.value = this.freq / 2;
    const subGain = ac.createGain();
    subGain.gain.value = 0.4;
    sub.connect(subGain);
    subGain.connect(this.filt);
    sub.start();
    this._sub = sub;

    // Vibrato LFO
    this.lfo = ac.createOscillator();
    this.lfo.frequency.value = 4.5;
    const lfoAmt = ac.createGain();
    lfoAmt.gain.value = 3;
    this.lfo.connect(lfoAmt);
    lfoAmt.connect(this.osc.frequency);
    this.lfo.start();

    this.osc.connect(this.filt);
    this.filt.connect(this.gain);
    this.gain.connect(dryBus);
    this.gain.connect(reverbSend);

    this.osc.start();
    this.playing = true;
  }

  stopOsc() {
    if (!this.playing) return;
    const g = this.gain, o = this.osc, sub = this._sub, lfo = this.lfo;
    g.gain.setTargetAtTime(0, ac.currentTime, 0.25);
    setTimeout(() => {
      try { o.stop(); sub.stop(); lfo.stop(); } catch (_) {}
    }, 1200);
    this.osc = null; this._sub = null; this.lfo = null;
    this.filt = null; this.gain = null;
    this.playing = false;
  }

  update() {
    this.phase += this.phaseSpd;

    if (!this.dragging) {
      this.x += this.vx;
      this.y += this.vy;
      if (this.x - this.r < 0)  { this.x = this.r;     this.vx =  Math.abs(this.vx); }
      if (this.x + this.r > W)  { this.x = W - this.r; this.vx = -Math.abs(this.vx); }
      if (this.y - this.r < 0)  { this.y = this.r;     this.vy =  Math.abs(this.vy); }
      if (this.y + this.r > H)  { this.y = H - this.r; this.vy = -Math.abs(this.vy); }
    }

    // Smooth connection alpha
    this.connAlpha += (this.connected ? 1 : 0 - this.connAlpha) * 0.08;
    this.connAlpha  = Math.max(0, Math.min(1, this.connAlpha));

    // Update sparks
    this.sparks = this.sparks.filter(s => {
      s.x += s.vx; s.y += s.vy;
      s.life -= 0.03;
      s.vy += 0.05;
      return s.life > 0;
    });
  }

  spawnSparks(count) {
    for (let i = 0; i < count; i++) {
      const angle = Math.random() * Math.PI * 2;
      const spd   = 1 + Math.random() * 3;
      this.sparks.push({
        x: this.x, y: this.y,
        vx: Math.cos(angle) * spd,
        vy: Math.sin(angle) * spd,
        life: 0.6 + Math.random() * 0.4,
      });
    }
  }

  draw() {
    const pulse = Math.sin(this.phase);
    const rr    = this.r * (1 + 0.1 * pulse + 0.06 * this.connAlpha);
    const alpha = 0.25 + 0.25 * this.connAlpha;

    // Halo glow
    const halo = ctx.createRadialGradient(this.x, this.y, rr * 0.5, this.x, this.y, rr * 3);
    halo.addColorStop(0, rgba(this.col, alpha));
    halo.addColorStop(1, rgba(this.col, 0));
    ctx.beginPath();
    ctx.arc(this.x, this.y, rr * 3, 0, Math.PI * 2);
    ctx.fillStyle = halo;
    ctx.fill();

    // Body gradient
    const body = ctx.createRadialGradient(
      this.x - rr * 0.3, this.y - rr * 0.35, rr * 0.05,
      this.x, this.y, rr
    );
    body.addColorStop(0, '#ffffff');
    body.addColorStop(0.25, this.col.hex);
    body.addColorStop(1, rgba(this.col, 0.15));

    ctx.beginPath();
    ctx.arc(this.x, this.y, rr, 0, Math.PI * 2);
    ctx.fillStyle = body;
    ctx.fill();

    // Rim
    ctx.beginPath();
    ctx.arc(this.x, this.y, rr, 0, Math.PI * 2);
    ctx.strokeStyle = this.col.hex;
    ctx.lineWidth   = 1.5 + this.connAlpha * 1.5;
    ctx.shadowColor = this.col.hex;
    ctx.shadowBlur  = 12 + 18 * this.connAlpha;
    ctx.stroke();
    ctx.shadowBlur  = 0;

    // Specular shine
    ctx.beginPath();
    ctx.arc(this.x - rr * 0.3, this.y - rr * 0.3, rr * 0.18, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255,255,255,0.55)';
    ctx.fill();

    // Sparks
    for (const s of this.sparks) {
      ctx.beginPath();
      ctx.arc(s.x, s.y, 2, 0, Math.PI * 2);
      ctx.fillStyle = rgba(this.col, s.life);
      ctx.fill();
    }
  }
}

/* ─── CIRCLES ────────────────────────────────────────────────────────── */
let circles = [];

function initCircles() {
  circles = [];
  for (let i = 0; i < 8; i++) circles.push(new Circle(i));
}
initCircles();

/* ─── CONNECTION LOGIC ───────────────────────────────────────────────── */
const CONN_GAP = 130; // extra gap beyond radii to trigger connection

// Track previous connection state for spark spawn
const prevConn = new Set();

function processConnections() {
  // Reset
  for (const c of circles) c.connected = false;
  const active = new Set();

  for (let i = 0; i < circles.length; i++) {
    for (let j = i + 1; j < circles.length; j++) {
      const a = circles[i], b = circles[j];
      const dx   = b.x - a.x, dy = b.y - a.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      const thresh = a.r + b.r + CONN_GAP;

      if (dist < thresh) {
        const t   = 1 - dist / thresh; // 0..1 proximity
        const key = `${i}-${j}`;
        active.add(key); // Set.prototype.add — was incorrectly falling back to object assignment

        a.connected = true;
        b.connected = true;

        // Sparks on fresh connection
        if (!prevConn.has(key)) {
          a.spawnSparks(6);
          b.spawnSparks(6);
        }

        // Draw connection beam
        const grad = ctx.createLinearGradient(a.x, a.y, b.x, b.y);
        grad.addColorStop(0, rgba(a.col, t * 0.85));
        grad.addColorStop(1, rgba(b.col, t * 0.85));

        ctx.save();
        ctx.beginPath();
        ctx.moveTo(a.x, a.y);
        ctx.lineTo(b.x, b.y);
        ctx.strokeStyle = grad;
        ctx.lineWidth   = 1.5 + t * 3.5;
        ctx.shadowColor = a.col.hex;
        ctx.shadowBlur  = 10 + t * 20;
        ctx.stroke();
        ctx.restore();

        // Travelling dot along beam
        const dot = (Date.now() / 800) % 1;
        const dx2 = b.x - a.x, dy2 = b.y - a.y;
        ctx.beginPath();
        ctx.arc(a.x + dx2 * dot, a.y + dy2 * dot, 3 * t, 0, Math.PI * 2);
        ctx.fillStyle = '#ffffff';
        ctx.fill();
      }
    }
  }

  // Swap active → prevConn for next frame's spark-spawn check
  prevConn.clear();
  active.forEach(k => prevConn.add(k));
}

/* ─── AUDIO PER CIRCLE ───────────────────────────────────────────────── */
function updateAudio() {
  if (!audioReady) return;
  for (const c of circles) {
    if (c.connected) {
      if (!c.playing) c.startOsc();
      if (c.gain) {
        const vol = muted ? 0 : 0.18;
        c.gain.gain.setTargetAtTime(vol, ac.currentTime, 0.15);
      }
    } else {
      if (c.playing) c.stopOsc();
    }
  }
}

/* ─── INPUT ──────────────────────────────────────────────────────────── */
let drag = null, touchID = null;

function getXY(e) {
  const rect = canvas.getBoundingClientRect();
  if (e.touches) {
    let t = touchID !== null
      ? Array.from(e.touches).find(t => t.identifier === touchID)
      : e.touches[0];
    if (!t) return null;
    return { x: t.clientX - rect.left, y: t.clientY - rect.top };
  }
  return { x: e.clientX - rect.left, y: e.clientY - rect.top };
}

function hitTest(x, y) {
  for (let i = circles.length - 1; i >= 0; i--) {
    const c = circles[i];
    const dx = x - c.x, dy = y - c.y;
    if (dx * dx + dy * dy < (c.r + 12) * (c.r + 12)) return c;
  }
  return null;
}

function onDown(e) {
  e.preventDefault();

  if (!audioReady) {
    initAudio();
    tapMsg.style.display = 'none';
  }

  if (e.touches) touchID = e.touches[0].identifier;

  const p = getXY(e);
  if (!p) return;
  const c = hitTest(p.x, p.y);
  if (c) {
    drag = c;
    c.dragging = true;
    c.vx = c.vy = 0;
  }
}

function onMove(e) {
  e.preventDefault();
  if (!drag) return;
  const p = getXY(e);
  if (!p) return;
  const px = drag.x, py = drag.y;
  drag.x = Math.max(drag.r, Math.min(W - drag.r, p.x));
  drag.y = Math.max(drag.r, Math.min(H - drag.r, p.y));
  drag.vx = (drag.x - px) * 0.25;
  drag.vy = (drag.y - py) * 0.25;
}

function onUp(e) {
  e.preventDefault();
  if (drag) { drag.dragging = false; drag = null; }
  touchID = null;
}

canvas.addEventListener('mousedown',  onDown, { passive: false });
canvas.addEventListener('mousemove',  onMove, { passive: false });
canvas.addEventListener('mouseup',    onUp,   { passive: false });
canvas.addEventListener('touchstart', onDown, { passive: false });
canvas.addEventListener('touchmove',  onMove, { passive: false });
canvas.addEventListener('touchend',   onUp,   { passive: false });

// Mute on title tap
document.getElementById('hud').style.pointerEvents = 'auto';
document.getElementById('hud').addEventListener('click', () => {
  if (!audioReady) return;
  muted = !muted;
  masterGain.gain.setTargetAtTime(muted ? 0 : 0.75, ac.currentTime, 0.2);
  document.getElementById('title').style.opacity = muted ? '0.4' : '1';
});

/* ─── BACKGROUND ─────────────────────────────────────────────────────── */
function drawBg() {
  ctx.fillStyle = 'rgba(0,0,10,0.88)';
  ctx.fillRect(0, 0, W, H);

  // Retro grid
  ctx.save();
  ctx.strokeStyle = 'rgba(0,60,100,0.18)';
  ctx.lineWidth = 0.5;
  const gs = 55;
  for (let x = 0; x < W; x += gs) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
  }
  for (let y = 0; y < H; y += gs) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }
  ctx.restore();

  // Subtle scanlines
  ctx.fillStyle = 'rgba(0,0,0,0.04)';
  for (let y = 0; y < H; y += 3) ctx.fillRect(0, y, W, 1);
}

/* ─── MAIN LOOP ──────────────────────────────────────────────────────── */
function loop() {
  drawBg();

  processConnections();   // draw beams & set .connected

  for (const c of circles) c.update();

  updateAudio();

  for (const c of circles) c.draw();

  requestAnimationFrame(loop);
}

requestAnimationFrame(loop);
</script>
</body>
</html>
